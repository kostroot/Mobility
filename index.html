// ── Audio ──────────────────────────────────────────────────────────────────
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, vol=0.6, type='sine'){
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function beepSwitch(){ beep(880, 0.35, 0.7); }           // single high beep — switch sides
function beepCountdown(){ beep(660, 0.18, 0.5); }        // short mid beep — countdown tick
function beepDone(){ beep(520, 0.15, 0.5); setTimeout(()=>beep(780, 0.3, 0.6), 160); } // two-tone — exercise done

// ── Fullscreen ─────────────────────────────────────────────────────────────
function enterFullscreen(){
  const el = document.getElementById('fs-panel');
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  document.getElementById('fs-panel').style.display='flex';
}
function exitFullscreen(){
  if(document.exitFullscreen) document.exitFullscreen();
  else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  document.getElementById('fs-panel').style.display='none';
}
document.addEventListener('fullscreenchange', ()=>{
  if(!document.fullscreenElement) document.getElementById('fs-panel').style.display='none';
});

// ── Helpers ────────────────────────────────────────────────────────────────
function fmt(s){
  if(s>=60) return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  return s+'s';
}
function cur(){ return R[S.r].exercises[S.e]; }

// ── Routing ────────────────────────────────────────────────────────────────
function setRoutine(i){
  clearInterval(ticker); ticker=null;
  S={r:i,e:0,side:0,tLeft:0,running:false,done:false,resting:false,restLeft:0,restDur:10,restPaused:false};
  render();
}
function jumpTo(i){
  clearInterval(ticker); ticker=null;
  S={...S,e:i,side:0,tLeft:0,running:false,done:false,resting:false,restLeft:0,restDur:10,restPaused:false};
  render();
}

// ── Playback ───────────────────────────────────────────────────────────────
function togglePlay(){
  // unlock audio on first interaction
  try { getAudio(); } catch(e){}

  if(S.resting){
    if(S.restPaused){
      // resume rest countdown
      S.restPaused=false; render();
      ticker=setInterval(restTick,1000);
    } else {
      // pause rest countdown
      clearInterval(ticker); ticker=null;
      S.restPaused=true; render();
    }
    return;
  }
  if(S.running){
    clearInterval(ticker); ticker=null;
    S.running=false; render(); return;
  }
  if(S.tLeft<=0){
    const ex=cur();
    S.tLeft = ex.sides==='L/R' ? Math.floor(ex.dur/2) : ex.dur;
  }
  S.running=true; render();
  ticker=setInterval(tick,1000);
}

function skipRest(){
  clearInterval(ticker); ticker=null;
  S.resting=false; S.restLeft=0; S.restPaused=false;
  startExercise();
}

function startExercise(){
  const ex=cur();
  const sideDur = ex.sides==='L/R' ? Math.floor(ex.dur/2) : ex.dur;
  S.tLeft=sideDur; S.running=true; S.resting=false; S.restPaused=false;
  render(); updateFS();
  ticker=setInterval(tick,1000);
}

function restTick(){
  S.restLeft--;
  const n=document.getElementById('tsec');
  const nfs=document.getElementById('fs-tsec');
  const a=document.getElementById('arc');
  const afs=document.getElementById('fs-arc');
  const disp=S.restLeft+'s';
  const off=CIRCUM*(1-S.restLeft/S.restDur);
  if(n) n.textContent=disp;
  if(nfs) nfs.textContent=disp;
  if(a) a.style.strokeDashoffset=off;
  if(afs) afs.style.strokeDashoffset=off;
  if(S.restLeft<=0){
    clearInterval(ticker); ticker=null;
    S.resting=false; S.restLeft=0; S.restPaused=false;
    startExercise();
  }
}

function startRest(secs=10){
  S.resting=true; S.restLeft=secs; S.restDur=secs; S.running=false; S.restPaused=false;
  render(); updateFS();
  ticker=setInterval(restTick,1000);
}

function tick(){
  S.tLeft--;
  const ex=cur();
  // for L/R exercises, each side duration is half
  const sideDur = ex.sides==='L/R' ? Math.floor(ex.dur/2) : ex.dur;
  const n=document.getElementById('tsec');
  const nfs=document.getElementById('fs-tsec');
  const a=document.getElementById('arc');
  const afs=document.getElementById('fs-arc');
  const off=CIRCUM*(1-S.tLeft/sideDur);
  if(n) n.textContent=fmt(S.tLeft);
  if(nfs) nfs.textContent=fmt(S.tLeft);
  if(a) a.style.strokeDashoffset=off;
  if(afs) afs.style.strokeDashoffset=off;
  // countdown beeps at 3,2,1
  if(S.tLeft>0 && S.tLeft<=3) beepCountdown();
  if(S.tLeft<=0){
    clearInterval(ticker); ticker=null; S.running=false;
    beepDone();
    if(ex.sides==='L/R'&&S.side===0){
      beepSwitch();
      S.side=1; startRest(5); return;
    }
    advance();
  }
}

function advance(){
  const r=R[S.r]; S.side=0;
  if(S.e<r.exercises.length-1){ S.e++; S.tLeft=0; startRest(); }
  else{ S.done=true; exitFullscreen(); render(); }
}

function nextEx(){
  clearInterval(ticker); ticker=null; S.running=false; S.resting=false; S.restLeft=0; S.restPaused=false;
  if(cur().sides==='L/R'&&S.side===0){ S.side=1; S.tLeft=0; render(); return; }
  advance();
}
function prevEx(){
  clearInterval(ticker); ticker=null; S.running=false; S.resting=false; S.restLeft=0; S.restPaused=false;
  if(S.side===1){ S.side=0; S.tLeft=0; render(); return; }
  if(S.e>0){ S.e--; S.side=0; S.tLeft=0; S.done=false; render(); }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  const r=R[S.r];
  document.getElementById('tabs').innerHTML=R.map((rt,i)=>`
    <div class="tab ${i===S.r?'active':''}" style="--rc:${rt.color}" onclick="setRoutine(${i})">
      <span class="tab-icon">${rt.icon}</span>
      <span class="tab-name">${rt.name}</span>
      <span class="tab-meta">${rt.meta}</span>
    </div>`).join('');

  document.getElementById('exList').innerHTML=r.exercises.map((ex,i)=>`
    <div class="ex-item ${i===S.e?'active':''} ${i<S.e?'done':''}" style="--rc:${r.color}" onclick="jumpTo(${i})">
      <span class="ex-num">${i<S.e?'✓':(i+1)}</span>
      <div class="ex-info">
        <div class="ex-name">${ex.name}${ex.badge?badgeHTML[ex.badge]:''}</div>
        <div class="ex-detail">${ex.detail}</div>
      </div>
      <span class="ex-dur">${ex.sides==='L/R' ? fmt(Math.floor(ex.dur/2))+' ×2' : fmt(ex.dur)}</span>
    </div>`).join('');

  const pct=S.done?100:Math.round(S.e/r.exercises.length*100);
  const pg=document.getElementById('prog');
  pg.style.width=pct+'%'; pg.style.background=r.color;
  document.getElementById('prog-lbl').textContent=S.done?'Complete! 🎉':`${S.e} / ${r.exercises.length} · ${r.name}`;
  renderTimer();
  updateFS();
}

function timerHTML(forFS){
  const r=R[S.r];
  const idPfx = forFS ? 'fs-' : '';
  if(S.done){
    return `<div class="done-banner"><div class="big">🎉</div><h2>Routine Complete!</h2>
      <p style="color:#889;font-size:.8rem;margin-top:8px">${r.name} done.</p>
      <button class="btn btn-go" style="margin-top:16px" onclick="setRoutine(${S.r})">Restart</button></div>`;
  }
  if(S.resting){
    const nx=R[S.r].exercises[S.e];
    const off=CIRCUM*(1-S.restLeft/S.restDur);
    const btnLabel = S.restPaused ? '▶ Resume' : '⏸ Pause';
    return `
      <div class="t-label" style="color:#6ecf8e">REST</div>
      <div class="t-name" style="color:#6ecf8e; font-size:${forFS?'1.5rem':'1.15rem'}">Up next: ${nx.name}</div>
      ${nx.focus?`<div class="t-focus">🎯 ${nx.focus}</div>`:''}
      <div class="t-cue" style="color:#889">${forFS?nx.cue:'Get into position. Timer starts automatically.'}</div>
      ${nx.injury?`<div class="t-injury">${nx.injury}</div>`:''}
      <div class="t-circle-wrap">
        <div class="t-circle" style="${forFS?'width:180px;height:180px':''}">
          <svg viewBox="0 0 120 120" width="${forFS?180:128}" height="${forFS?180:128}">
            <circle class="tc-bg" cx="60" cy="60" r="54"/>
            <circle class="tc-fg" id="${idPfx}arc" cx="60" cy="60" r="54"
              stroke="#6ecf8e" stroke-dasharray="${CIRCUM}" stroke-dashoffset="${off}"/>
          </svg>
          <div class="t-text">
            <div class="t-secs" id="${idPfx}tsec" style="color:#6ecf8e;${forFS?'font-size:3rem':''}">${S.restLeft}s</div>
            <div class="t-side" style="color:#6ecf8e">REST</div>
          </div>
        </div>
      </div>
      <div class="t-ctrls">
        <button class="btn btn-back" onclick="prevEx()">← Back</button>
        <button class="btn btn-go" style="background:#6ecf8e;color:#0f1923" onclick="togglePlay()">${btnLabel}</button>
        <button class="btn btn-go" style="background:#4aaf6e;color:#0f1923" onclick="skipRest()">▶▶ Skip Rest</button>
        <button class="btn btn-skip" onclick="nextEx()">Skip Ex →</button>
        ${forFS?`<button class="btn btn-skip" onclick="exitFullscreen()">✕ Exit</button>`:''}
      </div>`;
  }
  const ex=cur();
  const sideDur = ex.sides==='L/R' ? Math.floor(ex.dur/2) : ex.dur;
  const dur=S.tLeft>0?S.tLeft:sideDur;
  const off=CIRCUM*(1-dur/sideDur);
  const sideStr=ex.sides==='L/R'?(S.side===0?'LEFT SIDE':'RIGHT SIDE'):(ex.sides||'');
  const c=r.color;
  const countdown = S.tLeft>0 && S.tLeft<=3;
  return `
    <div class="t-label">Exercise ${S.e+1} of ${r.exercises.length}</div>
    <div class="t-name" style="${forFS?'font-size:1.7rem':''};">${ex.name}${ex.badge?(' '+badgeHTML[ex.badge]):''}</div>
    ${ex.focus?`<div class="t-focus">🎯 ${ex.focus}</div>`:''}
    <div class="t-cue" style="${forFS?'font-size:1rem;':''};">${ex.cue}</div>
    ${ex.injury?`<div class="t-injury">${ex.injury}</div>`:''}
    <div class="t-circle-wrap">
      <div class="t-circle" style="${forFS?'width:180px;height:180px':''}">
        <svg viewBox="0 0 120 120" width="${forFS?180:128}" height="${forFS?180:128}">
          <circle class="tc-bg" cx="60" cy="60" r="54"/>
          <circle class="tc-fg" id="${idPfx}arc" cx="60" cy="60" r="54"
            stroke="${countdown?'#f0a060':c}" stroke-dasharray="${CIRCUM}" stroke-dashoffset="${off}"/>
        </svg>
        <div class="t-text">
          <div class="t-secs" id="${idPfx}tsec" style="${countdown?'color:#f0a060':''}${forFS?';font-size:3rem':''}">${fmt(dur)}</div>
          ${sideStr?`<div class="t-side">${sideStr}</div>`:''}
        </div>
      </div>
    </div>
    <div class="t-ctrls">
      <button class="btn btn-back" onclick="prevEx()">← Back</button>
      <button class="btn btn-go" onclick="togglePlay()">${S.running?'⏸ Pause':(S.tLeft>0?'▶ Resume':'▶ Start')}</button>
      <button class="btn btn-skip" onclick="nextEx()">Skip →</button>
      ${forFS?`<button class="btn btn-skip" onclick="exitFullscreen()">✕ Exit</button>`:`<button class="btn btn-go" style="background:#334;color:#aab" onclick="enterFullscreen()">⛶ Full</button>`}
    </div>`;
}

function renderTimer(){
  document.getElementById('timerPanel').innerHTML = timerHTML(false);
}
function updateFS(){
  const fs=document.getElementById('fs-inner');
  if(fs) fs.innerHTML = timerHTML(true);
}

render();
</script>
</body>
</html>
<script>
// ── Wake Lock — keeps screen on while routine is active ────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
async function releaseWakeLock() {
  if(wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
}
// Re-acquire if user switches tabs and comes back mid-routine
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && (S.running || S.resting)) requestWakeLock();
  else if(document.visibilityState === 'hidden') releaseWakeLock();
});
// Hook into existing functions
const _togglePlay = togglePlay;
togglePlay = function() {
  _togglePlay();
  if(S.running || S.resting) requestWakeLock(); else releaseWakeLock();
};
const _skipRest = skipRest;
skipRest = function() { _skipRest(); requestWakeLock(); };
const _setRoutine = setRoutine;
setRoutine = function(i) { _setRoutine(i); releaseWakeLock(); };
</script>
